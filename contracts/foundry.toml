[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
  "@foundry-rs/forge-std/=node_modules/forge-std/src/",
  "forge-std/=node_modules/forge-std/src/"
]
